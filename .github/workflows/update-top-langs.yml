name: Update top languages badge

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone github-readme-stats
        run: git clone --depth 1 https://github.com/mrLogerman/github-readme-stats.git ../github-readme-stats

      - name: Install stats dependencies
        run: npm ci
        working-directory: ../github-readme-stats

      - name: Regenerate SVG
        env:
          PAT_1: ${{ secrets.STATS_PAT }}
        run: node scripts/generate-top-langs.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/top-langs.svg
          git diff --staged --quiet || git commit -m "Update top languages badge from all repositories."
          git push
