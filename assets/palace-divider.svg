<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 96" role="img" aria-label="Logerofman divider">
  <defs>
    <linearGradient id="skyFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="spire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="18%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#ddd6fe" stop-opacity="1"/>
      <stop offset="82%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gem" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="920" height="96" fill="url(#skyFade)"/>

  <!-- stars -->
  <circle cx="84" cy="18" r="1.1" fill="#c4b5fd" opacity="0.85"/>
  <circle cx="176" cy="28" r="0.9" fill="#ddd6fe" opacity="0.7"/>
  <circle cx="268" cy="14" r="1.2" fill="#a78bfa" opacity="0.9"/>
  <circle cx="652" cy="22" r="1" fill="#ddd6fe" opacity="0.75"/>
  <circle cx="744" cy="12" r="1.15" fill="#c4b5fd" opacity="0.85"/>
  <circle cx="836" cy="26" r="0.85" fill="#a78bfa" opacity="0.65"/>
  <circle cx="412" cy="10" r="0.8" fill="#ede9fe" opacity="0.55"/>
  <circle cx="508" cy="20" r="0.75" fill="#ede9fe" opacity="0.5"/>

  <!-- distant palace ridge -->
  <path fill="#241b53" opacity="0.55"
    d="M0 78
       L42 66 L58 72 L96 58 L118 64 L154 52 L176 58 L214 46 L236 52 L272 42 L294 48 L330 38 L352 44 L388 34 L410 40 L446 30 L468 36 L504 28 L526 34 L562 26 L584 32 L620 24 L642 30 L678 22 L700 28 L736 20 L758 26 L794 18 L816 24 L852 16 L874 22 L920 30
       L920 96 L0 96 Z"/>

  <!-- main palace skyline -->
  <path fill="url(#spire)"
    d="M0 88
       L56 62 L72 68 L98 54 L114 60 L140 46 L156 52 L182 40 L198 46 L224 34 L240 40 L266 30 L282 36 L308 26 L324 32 L350 22 L366 28 L392 18 L408 24 L434 16 L450 22 L460 18 L470 24 L496 14 L512 20 L538 12 L554 18 L580 10 L596 16 L622 8 L638 14 L664 6 L680 12 L706 4 L722 10 L748 2 L764 8 L790 0 L806 6 L832 0 L848 6 L874 0 L890 6 L920 12
       L920 96 L0 96 Z"/>

  <!-- window lights -->
  <rect x="318" y="44" width="4" height="5" rx="0.5" fill="#ddd6fe" opacity="0.55"/>
  <rect x="402" y="36" width="4" height="5" rx="0.5" fill="#c4b5fd" opacity="0.65"/>
  <rect x="486" y="30" width="4" height="5" rx="0.5" fill="#ede9fe" opacity="0.7"/>
  <rect x="570" y="34" width="4" height="5" rx="0.5" fill="#ddd6fe" opacity="0.55"/>
  <rect x="654" y="28" width="4" height="5" rx="0.5" fill="#c4b5fd" opacity="0.6"/>

  <!-- horizon beam -->
  <line x1="40" y1="68" x2="880" y2="68" stroke="url(#beam)" stroke-width="1.6" filter="url(#softGlow)"/>

  <!-- center gem -->
  <path d="M460 58 L472 68 L460 78 L448 68 Z" fill="url(#gem)" filter="url(#softGlow)"/>
  <path d="M460 61 L468 68 L460 75 L452 68 Z" fill="#ede9fe" opacity="0.35"/>
</svg>
